shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade

allowBuilds:
  esbuild: true

overrides:
  '@vueuse/core': ^14.3.0
  esbuild: ^0.28.0
  markdown-it: ^14.2.0
  vite: ^8.0.16
  vue: ^3.5.35

patchedDependencies:
  floating-vue@5.2.2: patches/floating-vue@5.2.2.patch

minimumReleaseAgeExclude:
  - '@vuepress-plume/plugin-fonts@1.0.0-rc.203'
  - '@vuepress-plume/plugin-search@1.0.0-rc.203'
  - vuepress-plugin-md-power@1.0.0-rc.203
  - vuepress-theme-plume@1.0.0-rc.203
